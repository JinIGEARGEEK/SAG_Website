<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2818 780" width="2818" height="780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1F3C"/>
      <stop offset="100%" stop-color="#122d56"/>
    </linearGradient>

    <!-- Line glow -->
    <filter id="fglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="1" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong node glow -->
    <filter id="fnodeglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft area glow -->
    <filter id="fareasoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Map dot glow -->
    <filter id="fdotglow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Center radial for negative space -->
    <radialGradient id="centerDim" cx="50%" cy="42%" r="32%">
      <stop offset="0%" stop-color="#0d2650" stop-opacity="0.88"/>
      <stop offset="70%" stop-color="#0A1F3C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A1F3C" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom fade -->
    <linearGradient id="fadeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F3C" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0e2448" stop-opacity="1"/>
    </linearGradient>

    <!-- Left fade -->
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1F3C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A1F3C" stop-opacity="0"/>
    </linearGradient>

    <!-- Right fade -->
    <linearGradient id="fadeR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#0A1F3C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A1F3C" stop-opacity="0"/>
    </linearGradient>

    <!-- Top fade -->
    <linearGradient id="fadeT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F3C" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0A1F3C" stop-opacity="0"/>
    </linearGradient>
  </defs>

